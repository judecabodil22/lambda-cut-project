name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: Lint with flake8
      run: |
        flake8 workflows/ --max-line-length=120 --ignore=E501,W503
    
    - name: Check for common issues
      run: |
        # Check for debug statements left in code
        grep -r "print(" workflows/*.py || true
        grep -r "TODO" workflows/*.py || true
        grep -r "FIXME" workflows/*.py || true
